<!doctype html>
<!--
  Source template for /public/og-image.png (1200×630).

  Regenerate with:
    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
      --headless=new --disable-gpu --hide-scrollbars \
      --window-size=1200,630 \
      --screenshot="$(pwd)/public/og-image.png" \
      "file://$(pwd)/scripts/og-template.html"
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --color-bg: #f6f6f6;
        --color-text: #4B4B4B;
        --color-text-soft: #6a6258;
        --color-rail-blue: #009DE0;
      }
      html, body { margin: 0; padding: 0; }
      body {
        width: 1200px;
        height: 630px;
        background: var(--color-bg);
        font-family: 'Inter', sans-serif;
        color: var(--color-text);
        position: relative;
        overflow: hidden;
      }
      .map {
        position: absolute;
        top: -120px;
        left: 50%;
        transform: translateX(-50%);
        width: 1280px;
        height: auto;
        filter: saturate(0.30) opacity(0.45);
        pointer-events: none;
        z-index: 0;
      }
      .stripe {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 8px;
        background: var(--color-rail-blue);
        z-index: 2;
      }
      .content {
        position: relative;
        z-index: 1;
        padding: 88px 88px 80px;
        height: 100%;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .wordmark {
        width: 640px;
        height: auto;
        display: block;
      }
      .tagline-block {
        max-width: 980px;
      }
      .eyebrow {
        font-family: 'Barlow Condensed', sans-serif;
        font-weight: 700;
        font-size: 22px;
        text-transform: uppercase;
        letter-spacing: 0.22em;
        color: var(--color-rail-blue);
        margin: 0 0 18px;
      }
      .tagline {
        font-family: 'Inter', sans-serif;
        font-weight: 500;
        font-size: 40px;
        line-height: 1.25;
        color: var(--color-text);
        letter-spacing: 0.003em;
        margin: 0;
      }
      .tagline .sep {
        color: var(--color-rail-blue);
        font-weight: 600;
        padding: 0 6px;
      }
      .footnote {
        font-family: 'Inter', sans-serif;
        font-weight: 400;
        font-size: 22px;
        color: var(--color-text-soft);
        margin: 18px 0 0;
        letter-spacing: 0.005em;
      }
    </style>
  </head>
  <body>
    <img class="map" src="../public/map-wallpaper.svg" alt="" aria-hidden="true" />
    <div class="stripe"></div>
    <div class="content">
      <img class="wordmark" src="../public/wordmark.svg" alt="Scott Gerstl" />
      <div class="tagline-block">
        <p class="eyebrow">Portfolio</p>
        <p class="tagline">
          Senior product designer<span class="sep">·</span>Berlin<span class="sep">·</span>Enterprise platforms and AI products
        </p>
        <p class="footnote">15 years shipping enterprise platforms and AI products.</p>
      </div>
    </div>
  </body>
</html>
